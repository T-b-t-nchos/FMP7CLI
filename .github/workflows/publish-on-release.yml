name: 💡 | Publish FMP7CLI

on:
  release:
    types:
      - created

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Ensure zip is installed
        shell: bash
        run: |
          set -e
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

      - name: Restore
        run: dotnet restore

      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir -p publish

      - name: Publish all runtimes
        shell: bash
        run: |
          set -e

          RP () {
            echo "=== Publishing $1 ==="

            pushd FMP7CLI >/dev/null

            rm -rf bin
            mkdir -p bin

            if [[ "$1" != osx-* ]]; then
              extra_flags="-p:PublishReadyToRun=true"
            else
              extra_flags=""
            fi

            dotnet publish -c Release -r "$1" -f net10.0-windows7.0 \
              --self-contained true \
              -p:PublishTrimmed=true \
              -p:AssemblyName=FMP7CLI \
              -p:PublishSingleFile=true \
              $extra_flags \
              -p:PublishDir=bin

            echo "--- bin contents ($1) ---"
            ls -la bin

            if [ -z "$(ls -A bin)" ]; then
              echo "bin is empty for $1"
              exit 1
            fi

            rm -rf bin/Release/

            (
              cd bin
              zip -r "../../publish/FMP7CLI_${{ github.event.release.tag_name }}_${1}.zip" .
            )

            popd >/dev/null
          }

          RP win-x86

      - name: Upload assets to Release (on release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*
