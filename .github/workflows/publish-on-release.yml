name: 💡 | Publish FMP7CLI

on:
  release:
    types:
      - created

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore FMP7CLI.sln

      - name: Prepare publish directory
        shell: pwsh
        run: |
          if (Test-Path publish) { Remove-Item -Recurse -Force publish }
          New-Item -ItemType Directory -Force -Path publish | Out-Null

      - name: Build and Package
        shell: pwsh
        run: |
          function Publish-Runtime {
            param([string]$Platform)
            
            Write-Host "=== Publishing $Platform ==="
            
            msbuild FMP7CLI.csproj `
              /p:Configuration=Release `
              /p:Platform=$Platform `
              /p:OutputPath="bin\Release\" `
              /p:DebugType=None
            
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Build failed for $Platform"
              exit 1
            }
            
            $outputFiles = Get-ChildItem -Path "bin\Release\" -File
            if ($outputFiles.Count -eq 0) {
              Write-Host "No output files for $Platform"
              exit 1
            }
            
            Write-Host "--- Output files ($Platform) ---"
            $outputFiles | ForEach-Object { Write-Host $_.FullName }
            
            $exeFile = Get-ChildItem -Path "bin\Release\*.exe" | Select-Object -First 1
            if ($exeFile) {
              $zipPath = "publish\FMP7CLI_${{ github.event.release.tag_name }}_${Platform}.zip"
              Compress-Archive -Path $exeFile.FullName -DestinationPath $zipPath -Force
              Write-Host "Created: $zipPath"
            }
          }
          
          Publish-Runtime "x64"
          Publish-Runtime "x86"

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*
